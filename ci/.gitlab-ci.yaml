# GitLab CI/CD Pipeline for yudao-k8s Project
#
# 阶段说明：
# - lint: 代码规范检查
# - test: 单元测试
# - build-frontend: 前端构建
# - build-backend: 后端构建
# - dockerize: 镜像构建与推送
# - deploy: 部署到 K8s

variables:
  # 使用 Git 提交的短 SHA 作为版本号
  VERSION: ${CI_COMMIT_SHORT_SHA}
  # Docker 镜像标签（latest 用于开发环境）
  IMAGE_TAG_LATEST: latest

# 定义流水线阶段
stages:
  - lint
  - test
  - build
  - deploy

# ==================== 前端相关任务 ====================

# 前端代码规范检查
lint-frontend:
  stage: lint
  image: node:18-alpine
  before_script:
    - npm config set registry https://registry.npmmirror.com
  script:
    - echo "前端代码规范检查（可根据项目添加 ESLint 等工具）"
    - echo "npm run lint"
  allow_failure: true
  only:
    changes:
      - frontend/**/*
      - ui/**/*

# 前端构建
build-frontend:
  stage: build
  image: node:18-alpine
  before_script:
    - npm config set registry https://registry.npmmirror.com
  script:
    - echo "开始构建前端..."
    - npm install
    - npm run build:local
    - ls -la dist/
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  only:
    changes:
      - frontend/**/*
      - ui/**/*
      - src/**/*

# 前端镜像构建与推送
dockerize-frontend:
  stage: build
  image: docker:24.0.5
  services:
    - name: docker:24.0.5-dind
      command: ["--insecure-registry=${HARBOR_REGISTRY}"]
  variables:
    DOCKER_HOST: tcp://docker:2375/
    DOCKER_TLS_CERTDIR: ""
  dependencies:
    - build-frontend
  before_script:
    - echo "${HARBOR_REGISTRY_PASSWD}" | docker login -u "${HARBOR_REGISTRY_USER}" --password-stdin "${HARBOR_REGISTRY}"
  script:
    - echo "构建前端镜像..."
    - docker build -t ${HARBOR_REGISTRY}/${HARBOR_NAMESPACE}/${IMAGE_WEB}:${VERSION} -f Dockerfile.frontend .
    - docker tag ${HARBOR_REGISTRY}/${HARBOR_NAMESPACE}/${IMAGE_WEB}:${VERSION} ${HARBOR_REGISTRY}/${HARBOR_NAMESPACE}/${IMAGE_WEB}:${IMAGE_TAG_LATEST}
    - docker push ${HARBOR_REGISTRY}/${HARBOR_NAMESPACE}/${IMAGE_WEB}:${VERSION}
    - docker push ${HARBOR_REGISTRY}/${HARBOR_NAMESPACE}/${IMAGE_WEB}:${IMAGE_TAG_LATEST}
  only:
    changes:
      - frontend/**/*
      - ui/**/*
      - src/**/*

# ==================== 后端相关任务 ====================

# 后端代码规范检查
lint-backend:
  stage: lint
  image: maven:3.9-eclipse-temurin-17
  script:
    - echo "后端代码规范检查"
    - mvn checkstyle:check
  allow_failure: true
  only:
    changes:
      - "**/*.java"
      - "pom.xml"

# 后端单元测试
test-backend:
  stage: test
  image: maven:3.9-eclipse-temurin-17
  script:
    - echo "运行后端单元测试..."
    - mvn clean test
    - echo "测试完成"
  coverage: '/Total.*?([0-9]{1,3})%/'
  artifacts:
    reports:
      junit: "**/target/surefire-reports/TEST-*.xml"
    expire_in: 1 week
  only:
    changes:
      - "**/*.java"
      - "pom.xml"

# Gateway 镜像构建与推送
dockerize-gateway:
  stage: build
  image: docker:24.0.5
  services:
    - name: docker:24.0.5-dind
      command: ["--insecure-registry=${HARBOR_REGISTRY}"]
  variables:
    DOCKER_HOST: tcp://docker:2375/
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "${HARBOR_REGISTRY_PASSWD}" | docker login -u "${HARBOR_REGISTRY_USER}" --password-stdin "${HARBOR_REGISTRY}"
  script:
    - echo "构建 Gateway 镜像..."
    - docker build -t ${HARBOR_REGISTRY}/${HARBOR_NAMESPACE}/${IMAGE_GATEWAY}:${VERSION} -f Dockerfile.gateway .
    - docker tag ${HARBOR_REGISTRY}/${HARBOR_NAMESPACE}/${IMAGE_GATEWAY}:${VERSION} ${HARBOR_REGISTRY}/${HARBOR_NAMESPACE}/${IMAGE_GATEWAY}:${IMAGE_TAG_LATEST}
    - docker push ${HARBOR_REGISTRY}/${HARBOR_NAMESPACE}/${IMAGE_GATEWAY}:${VERSION}
    - docker push ${HARBOR_REGISTRY}/${HARBOR_NAMESPACE}/${IMAGE_GATEWAY}:${IMAGE_TAG_LATEST}
  only:
    changes:
      - "**/gateway/**/*"

# System 镜像构建与推送
dockerize-system:
  stage: build
  image: docker:24.0.5
  services:
    - name: docker:24.0.5-dind
      command: ["--insecure-registry=${HARBOR_REGISTRY}"]
  variables:
    DOCKER_HOST: tcp://docker:2375/
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "${HARBOR_REGISTRY_PASSWD}" | docker login -u "${HARBOR_REGISTRY_USER}" --password-stdin "${HARBOR_REGISTRY}"
  script:
    - echo "构建 System 镜像..."
    - docker build -t ${HARBOR_REGISTRY}/${HARBOR_NAMESPACE}/${IMAGE_SYSTEM}:${VERSION} -f Dockerfile.system .
    - docker tag ${HARBOR_REGISTRY}/${HARBOR_NAMESPACE}/${IMAGE_SYSTEM}:${VERSION} ${HARBOR_REGISTRY}/${HARBOR_NAMESPACE}/${IMAGE_SYSTEM}:${IMAGE_TAG_LATEST}
    - docker push ${HARBOR_REGISTRY}/${HARBOR_NAMESPACE}/${IMAGE_SYSTEM}:${VERSION}
    - docker push ${HARBOR_REGISTRY}/${HARBOR_NAMESPACE}/${IMAGE_SYSTEM}:${IMAGE_TAG_LATEST}
  only:
    changes:
      - "**/system/**/*"

# Infra 镜像构建与推送
dockerize-infra:
  stage: build
  image: docker:24.0.5
  services:
    - name: docker:24.0.5-dind
      command: ["--insecure-registry=${HARBOR_REGISTRY}"]
  variables:
    DOCKER_HOST: tcp://docker:2375/
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "${HARBOR_REGISTRY_PASSWD}" | docker login -u "${HARBOR_REGISTRY_USER}" --password-stdin "${HARBOR_REGISTRY}"
  script:
    - echo "构建 Infra 镜像..."
    - docker build -t ${HARBOR_REGISTRY}/${HARBOR_NAMESPACE}/${IMAGE_INFRA}:${VERSION} -f Dockerfile.infra .
    - docker tag ${HARBOR_REGISTRY}/${HARBOR_NAMESPACE}/${IMAGE_INFRA}:${VERSION} ${HARBOR_REGISTRY}/${HARBOR_NAMESPACE}/${IMAGE_INFRA}:${IMAGE_TAG_LATEST}
    - docker push ${HARBOR_REGISTRY}/${HARBOR_NAMESPACE}/${IMAGE_INFRA}:${VERSION}
    - docker push ${HARBOR_REGISTRY}/${HARBOR_NAMESPACE}/${IMAGE_INFRA}:${IMAGE_TAG_LATEST}
  only:
    changes:
      - "**/infra/**/*"

# ==================== 部署相关任务 ====================

# 部署到开发环境
deploy-dev:
  stage: deploy
  image: bitnami/kubectl:latest
  environment:
    name: dev
    url: http://dev.yudao.com
  script:
    - echo "部署到开发环境..."
    - kubectl config use-context dev
    - kubectl set image deployment/yudao-gateway yudao-gateway=${HARBOR_REGISTRY}/${HARBOR_NAMESPACE}/${IMAGE_GATEWAY}:${VERSION}
    - kubectl set image deployment/yudao-system yudao-system=${HARBOR_REGISTRY}/${HARBOR_NAMESPACE}/${IMAGE_SYSTEM}:${VERSION}
    - kubectl set image deployment/yudao-infra yudao-infra=${HARBOR_REGISTRY}/${HARBOR_NAMESPACE}/${IMAGE_INFRA}:${VERSION}
    - kubectl set image deployment/yudao-ui-admin yudao-ui-admin=${HARBOR_REGISTRY}/${HARBOR_NAMESPACE}/${IMAGE_WEB}:${VERSION}
    - kubectl rollout status deployment/yudao-gateway
    - kubectl rollout status deployment/yudao-system
    - kubectl rollout status deployment/yudao-infra
    - kubectl rollout status deployment/yudao-ui-admin
    - echo "部署完成"
  when: manual
  only:
    - develop

# 部署到生产环境
deploy-prod:
  stage: deploy
  image: bitnami/kubectl:latest
  environment:
    name: production
    url: https://www.yudao.com
  script:
    - echo "部署到生产环境..."
    - kubectl config use-context production
    - kubectl set image deployment/yudao-gateway yudao-gateway=${HARBOR_REGISTRY}/${HARBOR_NAMESPACE}/${IMAGE_GATEWAY}:${VERSION}
    - kubectl set image deployment/yudao-system yudao-system=${HARBOR_REGISTRY}/${HARBOR_NAMESPACE}/${IMAGE_SYSTEM}:${VERSION}
    - kubectl set image deployment/yudao-infra yudao-infra=${HARBOR_REGISTRY}/${HARBOR_NAMESPACE}/${IMAGE_INFRA}:${VERSION}
    - kubectl set image deployment/yudao-ui-admin yudao-ui-admin=${HARBOR_REGISTRY}/${HARBOR_NAMESPACE}/${IMAGE_WEB}:${VERSION}
    - kubectl rollout status deployment/yudao-gateway
    - kubectl rollout status deployment/yudao-system
    - kubectl rollout status deployment/yudao-infra
    - kubectl rollout status deployment/yudao-ui-admin
    - echo "部署完成"
  when: manual
  only:
    - main
    - master
