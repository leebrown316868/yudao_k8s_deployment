      containers:
        - name: yudao-system
          image: yudao-system-image
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 48081
              protocol: TCP
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
