# yudao-gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yudao-gateway
  labels:
    app: yudao-gateway
    version: v1.0.0
    component: gateway
    part-of: yudao
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yudao-gateway
  template:
    metadata:
      labels:
        app: yudao-gateway
        version: v1.0.0
    spec:
      containers:
        - name: yudao-gateway
          image: yudao-gateway-image
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 48080
              protocol: TCP
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 48080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 48080
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: yudao-config
                  key: SPRING_PROFILES_ACTIVE
            - name: NACOS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: yudao-config
                  key: NACOS_ADDR

