# yudao-ui-admin Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yudao-ui-admin
  labels:
    app: yudao-ui-admin
    version: v1.0.0
    component: frontend
    part-of: yudao
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yudao-ui-admin
  template:
    metadata:
      labels:
        app: yudao-ui-admin
        version: v1.0.0
    spec:
      containers:
        - name: yudao-ui-admin
          image: yudao-ui-admin-image
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
