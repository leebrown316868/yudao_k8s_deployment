          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: yudao-config
                  key: SPRING_PROFILES_ACTIVE
            - name: NACOS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: yudao-config
                  key: NACOS_ADDR
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: yudao-config
                  key: MYSQL_HOST
            - name: MYSQL_PORT
              valueFrom:
                configMapKeyRef:
                  name: yudao-config
                  key: MYSQL_PORT
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: yudao-config
                  key: MYSQL_DATABASE
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: yudao-secret
                  key: mysql-password
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: yudao-config
                  key: REDIS_HOST

