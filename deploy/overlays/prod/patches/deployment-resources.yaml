# Production Environment - Increased Resources
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yudao-gateway
spec:
  template:
    spec:
      containers:
        - name: yudao-gateway
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yudao-system
spec:
  template:
    spec:
      containers:
        - name: yudao-system
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yudao-infra
spec:
  template:
    spec:
      containers:
        - name: yudao-infra
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yudao-ui-admin
spec:
  template:
    spec:
      containers:
        - name: yudao-ui-admin
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
