# Production Environment Image Pull Secrets Patch
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yudao-gateway
spec:
  template:
    spec:
      imagePullSecrets:
        - name: harbor-registry
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yudao-system
spec:
  template:
    spec:
      imagePullSecrets:
        - name: harbor-registry
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yudao-infra
spec:
  template:
    spec:
      imagePullSecrets:
        - name: harbor-registry
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yudao-ui-admin
spec:
  template:
    spec:
      imagePullSecrets:
        - name: harbor-registry
